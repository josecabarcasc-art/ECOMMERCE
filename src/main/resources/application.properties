# ============================================================
#  application.properties — Configuración general de la API
# ============================================================

# --- Servidor ---
server.port=8080

# --- Nombre de la aplicación ---
spring.application.name=ecommerce-api

# ============================================================
#  Base de Datos H2 (en memoria)
# ============================================================
# URL de conexión: "ecommercedb" es el nombre de la base de datos en memoria
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialecto SQL que JPA usará para generar queries compatibles con H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate crea / actualiza las tablas automáticamente al arrancar
spring.jpa.hibernate.ddl-auto=create-drop

# Muestra las consultas SQL generadas por JPA en la consola (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
#  Consola H2 (accesible desde el navegador)
# ============================================================
# Habilita la consola web de H2
spring.h2.console.enabled=true
# Ruta donde estará disponible la consola
spring.h2.console.path=/h2-console
# Permite acceso desde cualquier origen (necesario en desarrollo)
spring.h2.console.settings.web-allow-others=true

# ============================================================
#  Swagger / OpenAPI
# ============================================================
# Ruta del JSON con la especificación OpenAPI
springdoc.api-docs.path=/api-docs
# Ruta de la interfaz gráfica Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
# Ordena los endpoints por método HTTP
springdoc.swagger-ui.operations-sorter=method
# Habilita "Try it out" por defecto (no hay que hacer clic)
springdoc.swagger-ui.try-it-out-enabled=true
# Muestra la barra de búsqueda para filtrar endpoints
springdoc.swagger-ui.filter=true
# Expande las respuestas por defecto
springdoc.swagger-ui.default-models-expand-depth=2
# Deep linking para compartir URLs de endpoints
springdoc.swagger-ui.deep-linking=true
# Muestra la duración de cada petición
springdoc.swagger-ui.display-request-duration=true
